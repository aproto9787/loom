name: Frontend Task
description: Frontend specialist leads implementation and hands off to a reviewer.
repo: ..
claudeMd: |
  Frontend policy — validate in browser, never route UI work to Codex
teams:
  - id: frontend
    description: Frontend specialist with reviewer
orchestrator:
  name: orchestrator
  type: claude-code
  role: claude-frontend
  model: claude-opus-4-6
  system: claude-frontend 전문가가 리더, code-reviewer가 검증
  agents:
    - name: reviewer
      type: claude-code
      role: code-reviewer
  delegation:
    - to: reviewer
      when: Implementation complete, ready for review
