version: loom/v1
name: Router File Demo
description: Route to a different file path and persist the mock response

inputs:
  - id: topic
    type: text
    prompt: "What should Loom write about?"
  - id: mode
    type: text
    prompt: "Use short or long mode"

nodes:
  - id: prompt
    type: io.input
  - id: route
    type: router.code
    config:
      expression: "mode === 'long' ? 'long' : 'short'"
    inputs:
      mode:
        from: $inputs.mode
    branches: [short, long]
  - id: claude_short
    type: agent.claude
    config:
      model: claude-opus-4-6
      system: Respond with a short friendly line.
    inputs:
      topic:
        from: $inputs.topic
    when: route.branch == 'short'
  - id: claude_long
    type: agent.claude
    config:
      model: claude-opus-4-6
      system: Respond with a short friendly line.
    inputs:
      topic:
        from: $inputs.topic
    when: route.branch == 'long'
  - id: write_short
    type: io.file
    config:
      mode: write
      path: outputs/short.txt
    inputs:
      content:
        from: claude_short.output
    when: route.branch == 'short'
  - id: write_long
    type: io.file
    config:
      mode: write
      path: outputs/long.txt
    inputs:
      content:
        from: claude_long.output
    when: route.branch == 'long'
  - id: output
    type: io.output
    inputs:
      value:
        from: write_short.content || write_long.content

outputs:
  - id: result
    from: output.output
