version: loom/v1
name: LiteLLM Demo
description: Run the mock LiteLLM adapter alongside the mock Claude adapter to compare streams.

inputs:
  - id: topic
    type: text
    prompt: "Topic for both agents"

nodes:
  - id: prompt
    type: io.input
  - id: claude_branch
    type: agent.claude
    config:
      model: claude-opus-4-6
      system: Respond with a short friendly line.
    inputs:
      topic:
        from: $inputs.topic
  - id: litellm_branch
    type: agent.litellm
    config:
      model: gpt-4o-mini
    inputs:
      topic:
        from: $inputs.topic
  - id: claude_out
    type: io.output
    inputs:
      value:
        from: claude_branch.output
  - id: litellm_out
    type: io.output
    inputs:
      value:
        from: litellm_branch.output

outputs:
  - id: claude
    from: claude_out.output
  - id: litellm
    from: litellm_out.output
