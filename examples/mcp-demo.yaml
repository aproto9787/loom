version: loom/v1
name: MCP Demo
description: Spawn the bundled mock MCP server, list its tools, and surface the tool count.

inputs: []

nodes:
  - id: tools_server
    type: mcp.server
    config:
      command: node
      args:
        - apps/server/src/mock-mcp-server.mjs
  - id: report
    type: io.output
    inputs:
      value:
        from: tools_server.toolCount

outputs:
  - id: count
    from: tools_server.toolCount
  - id: tools
    from: tools_server.tools
