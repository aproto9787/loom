name: Nested Agent Orchestration
description: A recursive agent tree where a specialist owns a deeper specialist.
repo: ..
orchestrator:
  name: lead
  type: claude-code
  system: You coordinate the team and hand off specialized work when needed.
  agents:
    - name: backend-lead
      type: codex
      system: You own backend architecture and can delegate database work.
      agents:
        - name: database-specialist
          type: codex
          system: You focus on schema and persistence details.
    - name: qa
      type: claude-code
      system: You review behavior and validate the final result.
