name: env
description: 시스템 환경 스펙 참조. 하드웨어, OS, Hyprland, 터미널, 개발도구, 서비스 정보. 환경/시스템/스펙/하드웨어 관련 질문 시 참조.
prompt: |
  환경, 시스템 스펙, 하드웨어, OS, 데스크탑, 터미널, 개발도구, 서비스 구성 관련 질문에서는 아래 기준 정보를 우선 참조한다.

  # 시스템 환경 스펙

  ## 하드웨어
  - CPU: AMD Ryzen 5 5600X, 6C/12T, 최대 4654MHz, AMD-V 지원
  - RAM: 31Gi
  - Swap: `/swapfile` 32G + zram 31.3G (prio 100)
  - GPU: NVIDIA RTX 3060 LHR (GA106), 12GB VRAM, 드라이버 590.48.01
  - 디스크: NVMe 465.8G (`nvme0n1`)
  - 파티션: `nvme0n1p1` 512M vfat `/boot/efi`, `nvme0n1p2` 465.3G btrfs (루트)
  - 모니터: Hansung Vuti27F14PQ, 2560x1440@144Hz, 27인치 (`DP-1`), 스케일 1.0

  ## OS / 커널
  - OS: Garuda Linux (Arch rolling)
  - 커널: `6.19.9-zen1-1-zen`
  - 패키지 관리자: Pacman v7.1.0

  ## 데스크탑 환경 (Hyprland)
  - Hyprland: 0.54.2 (2026-03-10)
  - 모니터: `DP-1`, 2560x1440@144, 좌상단 0x0, 스케일 1

  ### 주요 컴포넌트
  - 상태바: HyprPanel 0.1.0
  - 알림: swaync 0.12.5
  - 런처: rofi 2.0.0
  - 클립보드: cliphist + wl-paste
  - 스크린샷: hyprshot + swappy (swappy 1.8.0)
  - 잠금: hyprlock v0.9.3
  - 유휴: hypridle v0.1.7
  - 입력기: fcitx5 (한국어 IME)
  - 커서: catppuccin-mocha-dark-cursors, 크기 24

  ### 오토스타트
  - `hyprpanel`
  - `swaync`
  - `wl-paste+cliphist`
  - `fcitx5`
  - `wayvnc`
  - `vesktop`
  - `alacritty`
  - `sonobus`

  ### 주요 키바인드 (`$mainMod` = Super)
  - `Super+Return`: alacritty 실행
  - `Super+Q`: 창 닫기
  - `Super+D`: rofi 런처
  - `Super+V`: 플로팅 토글
  - `Super+F`: 전체화면
  - `Print`: 전체화면 스크린샷
  - `Super+Print`: 창 스크린샷
  - `Super+Shift+Print`: 영역 스크린샷
  - `Super+Ctrl+S`: 영역 → 클립보드
  - `Super+Shift+V`: cliphist 히스토리
  - `Super+Tab`: 워크스페이스 스위처 (GTK4 Layer Shell, 2페이지 3x3 그리드, 경계 넘기 UX)
  - `Super+Ctrl+1~9`: 페이지 2 워크스페이스 10~18 이동
  - `Super+Ctrl+Shift+1~9`: 현재 창을 워크스페이스 10~18로 이동
  - `Super+L`: hyprlock 잠금

  ## 터미널 구조
  - 터미널: Alacritty 0.16.1
  - 쉘: fish 4.5.0
  - 멀티플렉서: Zellij (로컬 인터랙티브 자동시작) + tmux 3.6a
  - 프롬프트: starship 1.24.2

  ### Fish 쉘 설정
  - `zellij` 자동실행 (로컬 인터랙티브 세션, SSH 아닐 때)
  - `starship` 프롬프트
  - `oh-my-fish bang-bang` 플러그인 (`!!`, `!$`)
  - `bat` → man 페이저
  - `tcod` / `tson` / `topus` 함수 (tmux + Codex 별칭)
  - `fastfetch` + `krabby` 시작화면

  ## 개발 도구
  - VSCode: 1.112.0
  - opencode: 1.2.27
  - Node.js: v25.8.1
  - npm: 11.12.0
  - pnpm: 10.32.1
  - Bun: 1.3.11
  - Rust / Cargo: 1.94.0
  - Python: 3.14.3
  - Git: 2.53.0
  - Docker: 29.3.0
  - Codex: 2.1.89

  ## 서비스 / 데몬
  - 오디오: PipeWire 1.6.2 (WirePlumber + PulseAudio 호환)
  - 원격 데스크탑: RustDesk 1.4.6 (클라이언트+서버)
  - SSH: OpenSSH 10.2p1
  - VNC: wayvnc v0.9.1 (`100.65.10.14:5900`)
  - 컨테이너: Docker 29.3.0
  - 게임 최적화: gamemoded
  - 기기 연동: KDE Connect
  - 클라우드: Nextcloud
  - MCP: Memento MCP
  - XDG 포털: xdg-desktop-portal-hyprland

  ## 사용 규칙
  - 환경 관련 답변에서는 위 정보를 사실 기준값으로 사용한다.
  - 모르는 항목은 추정하지 말고, 위에 없는 정보라고 명시한다.
  - 버전, 포트, 장치명, 서비스명은 가능한 한 원문 그대로 유지한다.
